name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Lint con ruff (fast Python linter)
  # ---------------------------------------------------------------------------
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff==0.8.4

      - name: Run ruff linter
        run: ruff check inference-service/
        # ruff verifica: imports no usados, variables no usadas,
        # estilo PEP8, complejidad, etc. — más rápido que flake8 + pylint

      - name: Auto-format with ruff and commit if needed
        run: |
          ruff format inference-service/
          if ! git diff --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add inference-service/
            git commit -m "style: auto-format with ruff"
            git push
          fi
        # Aplica el formato automáticamente y hace commit si hubo cambios.
        # Así el CI nunca falla por formateo — simplemente lo corrige.

  # ---------------------------------------------------------------------------
  # Job 2: Tests unitarios con pytest
  # ---------------------------------------------------------------------------
  test:
    name: Unit Tests (pytest)
    runs-on: ubuntu-latest
    needs: lint   # solo corre si lint pasa

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}  # asegura que usa el commit más reciente (post-format)

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: inference-service/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r inference-service/requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run unit tests
        working-directory: inference-service
        env:
          # Tests usan mocks — no necesitan servicios reales
          REDIS_URL: ""
          OLLAMA_BASE_URL: "http://localhost:11434"
          API_KEYS: ""
        run: pytest tests/ -v --tb=short

  # ---------------------------------------------------------------------------
  # Job 3: Build de imagen Docker (verifica que buildea sin errores)
  # ---------------------------------------------------------------------------
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test   # solo corre si tests pasan

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build inference-service image
        uses: docker/build-push-action@v6
        with:
          context: ./inference-service
          file: ./inference-service/Dockerfile
          push: false   # no pushear, solo verificar que buildea
          tags: inference-service:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
