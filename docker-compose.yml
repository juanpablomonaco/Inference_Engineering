# ---------------------------------------------------------------------------
# docker-compose.yml — Inference Engineering Stack
# ---------------------------------------------------------------------------
#
# Servicios:
#   inference-service : FastAPI + SentenceTransformers (Python)
#   ollama            : LLM local para generación RAG (Fase 3)
#   redis             : Cache distribuido de embeddings (Fase 4)
#
# Para correr (stack completo):
#   docker compose up --build          # primera vez
#   docker compose up                  # siguientes veces
#   docker compose up -d               # modo detached (background)
#   docker compose logs -f             # ver logs en tiempo real
#   docker compose down                # detener
#
# Solo inferencia (sin RAG/Redis):
#   docker compose up inference-service
#
# Nota sobre el startup:
#   Primera vez: ~5-10 min (build + descarga modelo HF + descarga modelo Ollama)
#   Siguientes:  ~15-30s (modelos cacheados en volúmenes)
# ---------------------------------------------------------------------------

version: "3.9"

services:

  # ── Servicio de Inferencia (Python/FastAPI) ──────────────────────────────
  inference-service:
    build:
      context: ./inference-service
      dockerfile: Dockerfile

    container_name: inference-service

    ports:
      - "8000:8000"

    environment:
      - HF_HOME=/app/.cache/huggingface
      - LOG_LEVEL=INFO
      # Fase 3: URL del servicio Ollama
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=llama3.2:1b
      - RAG_TOP_K=3
      # Fase 4: URL de Redis
      - REDIS_URL=redis://redis:6379

    volumes:
      - huggingface-cache:/app/.cache/huggingface
      - chroma-data:/app/chroma_data

    depends_on:
      ollama:
        condition: service_started
      redis:
        condition: service_healthy

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 90s


  # ── Ollama — LLM local (Fase 3) ──────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: ollama

    ports:
      - "11434:11434"

    volumes:
      # Persiste los modelos descargados (~1-8GB dependiendo del modelo)
      - ollama-models:/root/.ollama

    restart: unless-stopped

    # Health check: verifica que la API de Ollama responda
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

    # Nota: para usar GPU, descomentar:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]


  # ── Redis — Cache distribuido de embeddings (Fase 4) ─────────────────────
  redis:
    image: redis:7-alpine
    container_name: redis

    ports:
      - "6379:6379"

    # Configuración de persistencia Redis:
    # appendonly yes → AOF (Append Only File) — persiste cada write
    # Alternativa: rdb snapshots (--save 60 1)
    command: redis-server --appendonly yes

    volumes:
      - redis-data:/data

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s


# ---------------------------------------------------------------------------
# Volúmenes nombrados
# ---------------------------------------------------------------------------
volumes:
  # Cache de HuggingFace — modelos de embedding (~90MB)
  huggingface-cache:
    driver: local

  # Vector store ChromaDB — embeddings + HNSW index (Fase 2)
  chroma-data:
    driver: local

  # Modelos Ollama — LLM local (~1-8GB) (Fase 3)
  ollama-models:
    driver: local

  # Redis AOF — cache de embeddings persistente (Fase 4)
  redis-data:
    driver: local
