# ---------------------------------------------------------------------------
# docker-compose.yml — Inference Engineering Stack
# ---------------------------------------------------------------------------
#
# Servicios:
#   inference-service : FastAPI + SentenceTransformers (Python)
#   ollama            : LLM local para generación RAG (Fase 3)
#   redis             : Cache L2 + Rate Limiting (Fase 4)
#   prometheus        : Scraping de métricas (Fase 6)
#   grafana           : Dashboards P50/P95/P99 (Fase 6)
#   redis-exporter    : Métricas de Redis para Prometheus (Fase 6)
#
# Perfiles de ejecución:
#   Stack completo:
#     docker compose up --build
#
#   Solo inferencia core (sin RAG ni observabilidad):
#     docker compose up inference-service redis --build
#
#   Con observabilidad pero sin RAG:
#     docker compose up inference-service redis prometheus grafana redis-exporter
#
#   Con variables de entorno personalizadas:
#     cp .env.example .env  # editar .env
#     docker compose --env-file .env up --build
#
# Accesos:
#   API:       http://localhost:8000
#   Swagger:   http://localhost:8000/docs
#   Grafana:   http://localhost:3000  (admin / admin)
#   Prometheus http://localhost:9090
#   Ollama:    http://localhost:11434
# ---------------------------------------------------------------------------

version: "3.9"

services:

  # ── Servicio de Inferencia (Python/FastAPI) ──────────────────────────────
  inference-service:
    build:
      context: ./inference-service
      dockerfile: Dockerfile

    container_name: inference-service

    ports:
      - "8000:8000"

    env_file:
      - .env   # carga variables desde .env si existe (ver .env.example)

    environment:
      - HF_HOME=/app/.cache/huggingface
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2:1b}
      - INFERENCE_BACKEND=${INFERENCE_BACKEND:-ollama}
      - VLLM_BASE_URL=${VLLM_BASE_URL:-http://vllm:8001}
      - RAG_TOP_K=${RAG_TOP_K:-3}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - REDIS_EMBEDDING_TTL=${REDIS_EMBEDDING_TTL:-86400}
      - RATE_LIMIT_REQUESTS=${RATE_LIMIT_REQUESTS:-60}
      - RATE_LIMIT_WINDOW_SECONDS=${RATE_LIMIT_WINDOW_SECONDS:-60}
      - API_KEYS=${API_KEYS:-}
      # Multi-worker: número de procesos Uvicorn
      - WORKERS=${WORKERS:-1}

    volumes:
      - huggingface-cache:/app/.cache/huggingface
      - chroma-data:/app/chroma_data

    depends_on:
      ollama:
        condition: service_started
      redis:
        condition: service_healthy

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 90s


  # ── Ollama — LLM local (Fase 3) ──────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: ollama

    ports:
      - "11434:11434"

    volumes:
      - ollama-models:/root/.ollama

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

    # GPU support (descomentar si tenés NVIDIA):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]


  # ── Redis — Cache L2 + Rate Limiting (Fase 4) ────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: redis

    ports:
      - "6379:6379"

    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru

    volumes:
      - redis-data:/data

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s


  # ── Prometheus — Scraping de métricas (Fase 6) ───────────────────────────
  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: prometheus

    ports:
      - "9090:9090"

    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus

    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"   # retener 15 días de datos
      - "--web.enable-lifecycle"               # permite reload sin restart

    depends_on:
      - inference-service

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s


  # ── Grafana — Dashboards P50/P95/P99 (Fase 6) ───────────────────────────
  grafana:
    image: grafana/grafana:11.3.1
    container_name: grafana

    ports:
      - "3000:3000"

    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      # Deshabilitar analytics para desarrollo
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_ANALYTICS_CHECK_FOR_UPDATES=false

    volumes:
      # Datasource precargado (Prometheus)
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      # Dashboard precargado (Inference Engineering)
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      # Persistencia de datos de Grafana
      - grafana-data:/var/lib/grafana

    depends_on:
      - prometheus

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s


  # ── Redis Exporter — métricas Redis para Prometheus (Fase 6) ────────────
  redis-exporter:
    image: oliver006/redis_exporter:v1.66.0
    container_name: redis-exporter

    environment:
      - REDIS_ADDR=redis://redis:6379

    ports:
      - "9121:9121"

    depends_on:
      redis:
        condition: service_healthy

    restart: unless-stopped


# ---------------------------------------------------------------------------
# Volúmenes nombrados
# ---------------------------------------------------------------------------
volumes:
  huggingface-cache:
    driver: local

  chroma-data:
    driver: local

  ollama-models:
    driver: local

  redis-data:
    driver: local

  prometheus-data:
    driver: local

  grafana-data:
    driver: local
